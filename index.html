<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 發票報帳神器 | 智慧辨識發票收據</title>
    <meta name="description" content="上傳發票收據照片，AI 自動辨識建檔分類，一鍵匯出 CSV 報帳明細。" />
    <meta name="theme-color" content="#5b5bd6" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Cleanup: unregister any old service worker that may have cached
      // stale HTML referencing deleted asset hashes. The /sw.js shipped now
      // is a self-destructing version that wipes caches and unregisters.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          for (var i = 0; i < regs.length; i++) regs[i].unregister();
        });
        if (window.caches && caches.keys) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k); });
          });
        }
      }
    </script>
  </body>
</html>
